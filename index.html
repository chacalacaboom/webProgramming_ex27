<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

  body { 
    background-color: #5bb2ff; 
    padding: 50px; 
  }

  
  .card-container {
    background-color: white;
    padding: 20px; /* 參考 PPT p.15 [cite: 133] */
    border-radius: 15px; /* 雖然 PPT 文字沒寫，但練習圖上有圓角 */
    max-width: 800px;
    margin: auto;
  }

  /* 設定 Flexbox 容器  */
  .row {
    display: flex;
    flex-wrap: wrap; /* 允許折行，這樣小螢幕時才會堆疊  */
  }

  .box { margin: 5px; border-radius: 5px; }

  /* 頂部綠色：永遠佔 100%  */
  .header { background: #add65c; height: 100px; width: 100%; }

  /* 中間藍綠色：大螢幕時三個一排 (利用 flex 指定比例) */
  .teal { background: #00bcd4; height: 80px; flex: 30%; }

  /* 底部灰色：大螢幕時四個一排 */
  .gray { background: #ebedef; height: 40px; flex: 20%; }

  /* 小螢幕變動 (< 480px) */
  @media screen and (max-width: 480px) {
    /* 讓中間這排改為垂直堆疊  */
    .middle-row { flex-direction: column; }
    .teal { flex: 100%; }

    /* 讓底部這排變成兩兩一排  */
    .gray { flex: 45%; }
  }
</style>
</head>
<body>

<div class="card-container">
    <div class="header box"></div>

    <div class="row middle-row">
        <div class="teal box"></div>
        <div class="teal box"></div>
        <div class="teal box"></div>
    </div>

    <div class="row">
        <div class="gray box"></div>
        <div class="gray box"></div>
        <div class="gray box"></div>
        <div class="gray box"></div>
    </div>
</div>

</body>
</html>

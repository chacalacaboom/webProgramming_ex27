<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* 基礎設定：防止寬度計算出錯 [cite: 132, 134] */
  * { box-sizing: border-box; } 

  body {
    background-color: #5bb2ff; /* 藍色大背景 */
    padding: 20px;
    margin: 0;
  }

  /* 白色卡片容器 */
  .container {
    background-color: white;
    padding: 15px;
    border-radius: 15px;
    max-width: 800px;
    margin: auto;
    overflow: auto; /* 這是關鍵：清除浮動 (Clear Float) [cite: 79] */
  }

  /* 共用方塊樣式 */
  .box { margin: 5px; border-radius: 5px; float: left; }

  /* 頂部綠色：永遠佔滿一整行 */
  .header { background: #add65c; height: 100px; width: calc(100% - 10px); }

  /* 中間藍綠色：大螢幕時三個一排 (100/3 = 33%) */
  .teal { background: #00bcd4; height: 80px; width: calc(33.33% - 10px); }

  /* 底部灰色：大螢幕時四個一排 (100/4 = 25%) */
  .gray { background: #ebedef; height: 40px; width: calc(25% - 10px); }

  /* --- 重點：寬度小於 480px 时的變化 --- [cite: 33, 93, 120] */
  @media screen and (max-width: 480px) {
    /* 中間藍綠色：變成垂直堆疊 (一排一個) [cite: 122, 144] */
    .teal { width: calc(100% - 10px); }

    /* 底部灰色：變成 2x2 排列 (一排兩個) [cite: 116, 137] */
    .gray { width: calc(50% - 10px); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header box"></div>

  <div class="teal box"></div>
  <div class="teal box"></div>
  <div class="teal box"></div>

  <div class="gray box"></div>
  <div class="gray box"></div>
  <div class="gray box"></div>
  <div class="gray box"></div>
</div>

</body>
</html>
